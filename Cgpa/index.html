<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="output.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cgpa</title>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    <div role="alert" id="devAlert" class="alert alert-info fixed top-20 left-1/2 -translate-x-1/2 z-50 w-full max-w-sm px-4 hidden">
  <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
  </svg>
  <span>Still under development — kindly drop your suggestions using the button above 🙏</span>
    </div>
<div class="max-w-2xl mx-auto">
<div class="flex flex-col fixed justify-center items-center top-0 left-0 w-full shadow-md bg-main">


    <h1 class="text-2xl font-bold text-green-400 mb-1 mt-2">CGPA Calculator</h1>
    <div class="flex items-center gap-2 mb-2">
        <div class="inline-grid *:[grid-area:1/1]">
            <div class="status status-error animate-ping"></div>
            <div class="status status-error"></div>
        </div>
        <span class="text-xs text-red-400 font-semibold">Still Under Development</span>
    </div>
    <p class="text-sm text-gray-300 mb-6 font-extrabold">5-point grading scale (A=5, B=4, C=3, D=2, E=1, F=0)</p>
</div>
    <div class="flex flex-wrap gap-2 mb-4 items-center" id="semTabs"></div>


    

    <br>
    <br>



    
 <div class="flex flex-row justify-evenly items-center gap-5">  <a href="https://jenissi.me"> <button class="mb-4 mt-4 cursor-pointer bg-green-500 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-green-800 transition">Back to Main Page</button></a>
 <a href="https://jenissi.me/#contact"> <button class="mb-4 mt-4 cursor-pointer bg-green-500 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-green-800 transition">Kindly Submit Your Suggestions</button></a></div>

    <div class="bg-white rounded-xl shadow p-5 mb-4" id="semCard">


        <div class="flex justify-between items-center mb-4">

            <h2 class=" text-gray-700 font-bold" id="semTitle">Semester</h2>

            <span class="text-sm font-bold text-green-700 bg-green-50 border border-green-200 px-3 py-1 rounded-lg" id="semGpa"></span>
        </div>
        <table class="w-full text-sm mb-4">
            <thead>
            <tr class="text-left text-xs text-green-700 uppercase border-b font-bold">
                <th class="pb-2">Course</th>
                <th class="pb-2 text-center">Units</th>
                <th class="pb-2 text-center">Grade</th>
                <th class="pb-2 text-center">QP</th>
                <th class="pb-2"></th>
            </tr>
            </thead>

            <tbody id="courseList"></tbody>
        </table>

        <div class="flex flex-wrap gap-2 items-end">
            <div class="flex flex-col gap-1">
                <label class="text-xs text-gray-700 font-semibold">Course Code</label>
                <input id="name" type="text" placeholder="e.g. MTH 201"
                       class="border rounded-lg px-3 py-2 text-sm w-36 focus:outline-none focus:border-green-700 text-gray-700" onkeydown="if(event.key==='Enter') addCourse()"/>
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-xs text-gray-700 font-semibold">Units</label>
                <input id="unit" type="number" placeholder="1–6" min="1" max="6"
                       class="border rounded-lg px-3 py-2 text-sm w-20 focus:outline-none focus:border-green-500 text-gray-700"
                       onkeydown="if(event.key==='Enter') addCourse()"/>
            </div>


            <div class="flex flex-col gap-1">
                <label class="text-xs text-gray-700 font-semibold">Grade</label>
                <select id="grade" class="border rounded-lg px-3 py-2 text-sm w-24 focus:outline-none focus:border-green-500 text-gray-700">
                    <option value="5">A (5)</option>
                    <option value="4">B (4)</option>
                    <option value="3">C (3)</option>
                    <option value="2">D (2)</option>
                    <option value="1">E (1)</option>
                    <option value="0">F (0)</option>
                </select>
            </div>

              <button onclick="addCourse()"
          class="bg-green-500 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-green-800 transition">
          Add Course
        </button>
        </div>

</div>

    <div class="bg-white rounded-xl shadow p-5">
        <h3 class="text-sm font-semibold text-gray-500 uppercase tracking-wide mb-3">Summary</h3>
        <div class="flex gap-6 flex-wrap mb-3">
            <div>
                <p class="text-xs text-gray-700">CGPA</p>
                <p class="text-3xl font-bold text-green-700" id="cgpa">—</p>
            </div>
            <div>
                <p class="text-xs text-gray-700">Total Units</p>
                <p class="text-3xl font-bold text-gray-700" id="totalUnits">0</p>
            </div>
            <div>
                <p class="text-xs text-gray-700">Class Degree</p>
                <p class="text-lg font-semibold text-gray-700 mt-1" id="position">—</p>
            </div>
        </div>
        <button onclick="clearAll()" class="text-xs text-red-400 hover:text-red-600 transition cursor-pointer"> Clear all data ❌</button>
    </div>


</div>
<div id="popUp"
     class="fixed bottom-5 left-1/2 -translate-x-1/2 bg-green-700 text-white text-sm font-semibold px-5 py-2 rounded-full shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none">
    Saved✅
</div>

<script src="script.js">

</script>
</body>
</html>
